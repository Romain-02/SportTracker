name: CI/CD - Create Release on Version Bump

on:
  push:
    branches: [ main ]

jobs:
  check-version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Récupère tout l'historique pour comparer les tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Get current version from package.json
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Get latest Git tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "Latest Git tag: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: version_check
        run: |
          if [ "${{ steps.latest_tag.outputs.latest_tag }}" != "none" ]; then
            LATEST_VERSION=${{ steps.latest_tag.outputs.latest_tag }}
            LATEST_VERSION=${LATEST_VERSION#v}  # Supprime le préfixe 'v' si présent
            if [ "${{ steps.version.outputs.current_version }}" != "$LATEST_VERSION" ]; then
              echo "Version changed! Current: ${{ steps.version.outputs.current_version }}, Latest tag: $LATEST_VERSION"
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "Version not changed."
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No previous tag found. First release!"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Build project
        if: steps.version_check.outputs.should_release == 'true'
        run: npm run build

      - name: Create ZIP archive
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          ZIP_FILE="release-${{ steps.version.outputs.current_version }}.zip"
          zip -r $ZIP_FILE ./dist ./package.json ./README.md  # Ajoute les fichiers nécessaires
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.current_version }}
          name: Release v${{ steps.version.outputs.current_version }}
          body: |
            ### Changements
            - Mise à jour de la version ${{ steps.version.outputs.current_version }}
            - [Ajoute ici les notes de release]
          files: ${{ steps.version_check.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token automatique fourni par GitHub
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
