name: CI/CD - Create Release on Version Bump

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  check-version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Get current version from package.json
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Get latest Git tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}

          echo "Current: $CURRENT_VERSION"
          echo "Latest Tag: $LATEST_VERSION"

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Version change detected."
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No version change. Skipping release."
          fi

      - name: Inject Environment Variables
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          sed -i "s|#{CLIENT_ID}#|${{ secrets.CLIENT_ID }}|g" src/environments/environment.prod.ts
          sed -i "s|#{REFRESH_TOKEN}#|${{ secrets.REFRESH_TOKEN }}|g" src/environments/environment.prod.ts
          cat src/environments/environment.prod.ts

      - name: Build project
        if: steps.version_check.outputs.should_release == 'true'
        run: npm run build -- --configuration=production

      - name: Create ZIP archive
        id: create_zip
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          ZIP_FILE="release-${{ steps.version.outputs.current_version }}.zip"
          # On entre dans le dossier dist pour que les fichiers soient à la racine du zip
          cd dist
          zip -r "../$ZIP_FILE" .
          cd ..
          # On peut ajouter package.json à la racine du zip si vraiment nécessaire pour ton app
          zip -u "$ZIP_FILE" package.json readme.md
          echo "zip_file=$ZIP_FILE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.current_version }}
          name: Release v${{ steps.version.outputs.current_version }}
          files: ${{ steps.create_zip.outputs.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
